<!DOCTYPE html>
<html>
<head>
    <title>Track Your Order</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 450px;
            margin: 80px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
        }

        p {
            text-align: center;
            color: gray;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #28a745;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }

        .msg {
            text-align: center;
            color: red;
            margin-top: 10px;
        }

        .back {
            text-align: center;
            margin-top: 15px;
        }

        .back a {
            color: #555;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>📦 Track Your Order</h2>
    <p>Enter your Order ID and Email</p>

    <form method="POST">
        <input type="text" name="order_id" placeholder="Order ID (e.g. 12)" required>
        <input type="email" name="email" placeholder="Email used in order" required>

        <button type="submit">Track Order</button>
    </form>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="msg">
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <div class="back">
        <a href="/">← Back to Home</a>
    </div>

</div>

</body>
</html>
