{% extends "base.html" %}

{% block title %}Admin Login - Sandy Crochet{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-5 text-center">
                <div class="mb-4">
                    <i class="fas fa-crochet" style="font-size: 4rem; color: var(--primary);"></i>
                    <h2 class="mt-3 fw-bold text-dark">Admin Panel</h2>
                    <p class="text-muted">Sandy Crochet Shop</p>
                </div>
                
                <form method="POST">
                    <div class="mb-4">
                        <input type="text" name="username" class="form-control form-control-lg rounded-pill px-4" 
                               placeholder="Username" required>
                    </div>
                    <div class="mb-4">
                        <input type="password" name="password" class="form-control form-control-lg rounded-pill px-4" 
                               placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill py-3 fw-bold">
                        <i class="fas fa-sign-in-alt me-2"></i>Login
                    </button>
                </form>
                
            </div>
        </div>
    </div>
</div>
{% endblock %}
