<!-- templates/500.html -->
{% extends "base.html" %}

{% block title %}Server Error{% endblock %}

{% block content %}
<div class="container my-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <i class="bi bi-bug-fill fs-1 text-danger mb-4"></i>
            <h1 class="display-4 fw-bold mb-4 text-danger">Something Went Wrong</h1>
            <h2 class="mb-4">Server Error (500)</h2>
            <p class="lead mb-4">We're experiencing technical difficulties. Please try again later.</p>
            <a href="{{ url_for('index') }}" class="btn btn-crochet btn-lg">🧶 Go to Homepage</a>
        </div>
    </div>
</div>
{% endblock %}
