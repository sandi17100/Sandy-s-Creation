<!DOCTYPE html>
<html>
<head>
    <title>Order Status</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 500px;
            margin: 60px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .status {
            padding: 10px;
            border-radius: 8px;
            display: inline-block;
            font-weight: bold;
        }

        .pending { background: #fff3cd; color: #856404; }
        .processing { background: #cce5ff; color: #004085; }
        .paid { background: #e2d9f3; color: #5a2d82; }
        .delivered { background: #d4edda; color: #155724; }
        .cancelled { background: #f8d7da; color: #721c24; }

        ul {
            padding-left: 18px;
        }

        .item {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .back {
            margin-top: 20px;
            text-align: center;
        }

        .back a {
            text-decoration: none;
            color: #555;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Order #{{ order.id }}</h2>

    <p>
        Status:
        <span class="status {{ order.status }}">
            {{ order.status|title }}
        </span>
    </p>

    <p><b>Name:</b> {{ order.name }}</p>
    <p><b>Total:</b> {{ order.total }} MMK</p>
    <p><b>Date:</b> {{ order.created_at }}</p>

    <hr>

    <h3>Items</h3>

    <div>
        {% for item in order_items %}
            <div class="item">
                {{ item.name }} x {{ item.quantity }} — {{ item.price }} MMK
            </div>
        {% endfor %}
    </div>

    <div class="back">
        <a href="/">← Back to Home</a>
    </div>

</div>

</body>
</html>
